    <!-- ── Structured data (JSON-LD) ─────────────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebApplication",
          "@id": "https://gel-planner.netlify.app/#app",
          "name": "Running Gel Planner",
          "url": "https://gel-planner.netlify.app/",
          "description": "Free running nutrition calculator. Plan gel timing, hydration strategy, sodium targets, and electrolyte intake for marathons, ultras, and trail races. Upload GPX for elevation-aware scheduling.",
          "applicationCategory": "SportsApplication",
          "operatingSystem": "Web",
          "browserRequirements": "Requires JavaScript",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
          },
          "featureList": [
            "Gel timing calculator based on carbohydrate targets",
            "GPX file upload with elevation-aware scheduling (Naismith's rule)",
            "Hydration and sweat rate calculator",
            "Sodium and electrolyte recommendations",
            "156+ gel products database",
            "Caffeinated gel strategy planner",
            "Printable race card (A5 and wristband formats)",
            "GPX export for Garmin, Coros, Suunto, Komoot"
          ]
        },
        {
          "@type": "WebSite",
          "@id": "https://gel-planner.netlify.app/#website",
          "url": "https://gel-planner.netlify.app/",
          "name": "Gel Planner",
          "description": "Free race nutrition planning for runners",
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://gel-planner.netlify.app/?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "FAQPage",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "When should I take gels during a race?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "The first gel is typically taken 30–45 minutes into the race, before you feel hungry. Subsequent gels follow an interval based on your carbohydrate target: e.g., 60 g/hr with 22 g gels = one gel every 22 minutes. Stop taking gels 5 minutes before the finish line."
              }
            },
            {
              "@type": "Question",
              "name": "How do I calculate how many gels I need for a marathon?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Divide your target carbohydrate intake per hour by the carbs in each gel to get the gel interval in minutes. For a 4-hour marathon targeting 60 g carbs/hr with 22 g gels, you need approximately 10–11 gels."
              }
            },
            {
              "@type": "Question",
              "name": "How much should I drink during a marathon?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "A typical sweat rate starts at 500 ml/hr and increases by 100 ml per 5°C above 15°C, plus intensity adjustments (Easy +0 / Moderate +150 / Hard +300 ml/hr). Aim to replace 70–80% of sweat losses to avoid both dehydration and hyponatraemia."
              }
            },
            {
              "@type": "Question",
              "name": "What is the best caffeine gel strategy for a race?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Two common strategies: Alternating (every other gel is caffeinated, spreading intake across the race) or Final Push (caffeinated gels only in the last 25–30% of the race for a late boost). Avoid caffeine in the final 60 minutes if you're sensitive to it."
              }
            }
          ]
        }
      ]
    }
    </script>
